; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
lib_deps = adafruit/Adafruit VEML7700 Library@^2.1.6

upload_port  = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

; One-shot build to read the board's MAC over serial. Keeps real Serial alive
; (NullSerial bypassed) so the boot banner prints "MOTOR MAC: ...".
; ⚠ Magnet shares UART0 (GPIO1/3) and will twitch — disconnect it for this.
;   pio run -e esp32dev_macprint -t upload && pio device monitor
[env:esp32dev_macprint]
extends = env:esp32dev
build_flags =
    -std=gnu++17
    -DMOTOR_DEBUG_SERIAL
